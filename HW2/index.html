<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Basic page setup -->
  <!-- UTF-8 lets the page display characters correctly -->
  <meta charset="UTF-8">

  <!-- Makes the page scale correctly on phones/tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title that appears in the browser tab -->
  <title>HW2: US Geography Quiz</title>

  <!-- Bootstrap CSS -->
  <!-- I'm using Bootstrap so the quiz automatically has a clean layout -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

</head>

<body class="bg-light">

  <!-- Main container that centers the quiz and adds spacing -->
  <div class="container py-4">

    <!-- Page header -->
    <header class="mb-4 text-center">
      <h1 class="fw-bold">US Geography Quiz</h1>

      <!-- Small description under the title -->
      <p class="text-muted mb-0">
        10 questions • Total: 100 points
      </p>
    </header>


    <!-- This section shows how many times the quiz has been taken -->
    <!-- The value will come from Web Storage (localStorage) using JavaScript -->
    <div class="alert alert-info d-flex justify-content-between align-items-center" role="status">

      <!-- This span will update dynamically -->
      <span>
        <strong>Total times taken:</strong>
        <span id="attemptsCount">0</span>
      </span>

      <!-- Button that lets us reset the attempt counter -->
      <button id="resetAttemptsBtn"
              class="btn btn-sm btn-outline-dark"
              type="button">
        Reset Attempts
      </button>

    </div>


    <!-- Main quiz form -->
    <!-- All questions are inside this form -->
    <form id="quizForm" class="vstack gap-3">


      <!-- ========================= -->
      <!-- QUESTION 1 -->
      <!-- ========================= -->

      <section class="card shadow-sm">

        <div class="card-body">

          <!-- Question text -->
          <h2 class="h5">
            1) What is the capital of California?
          </h2>

          <!-- Radio buttons allow only ONE answer -->

          <div class="form-check">
            <input class="form-check-input"
                   type="radio"
                   name="q1"
                   id="q1a"
                   value="Los Angeles">

            <!-- Label improves accessibility and lets user click the text -->
            <label class="form-check-label" for="q1a">
              Los Angeles
            </label>
          </div>


          <div class="form-check">
            <input class="form-check-input"
                   type="radio"
                   name="q1"
                   id="q1b"
                   value="Sacramento">

            <label class="form-check-label" for="q1b">
              Sacramento
            </label>
          </div>


          <div class="form-check">
            <input class="form-check-input"
                   type="radio"
                   name="q1"
                   id="q1c"
                   value="San Diego">

            <label class="form-check-label" for="q1c">
              San Diego
            </label>
          </div>


          <!-- This area will show feedback after the quiz is submitted -->
          <!-- JavaScript will change the image and message here -->

          <div class="mt-3 d-flex align-items-center gap-2">

            <!-- Image showing correct/incorrect -->
            <img id="q1img"
                 src=""
                 alt=""
                 class="d-none"
                 style="width:28px;height:28px;">

            <!-- Text feedback -->
            <div id="q1fb" class="small"></div>

          </div>

        </div>

      </section>



      <!-- ================================================= -->
      <!-- Questions 2 – 10 follow the exact same structure  -->
      <!-- I used the same pattern so the JavaScript logic   -->
      <!-- can easily update the feedback for each question  -->
      <!-- ================================================= -->



      <!-- SUBMIT BUTTON -->

      <div class="d-grid gap-2">

        <!-- When this button is clicked the quiz is graded -->
        <button class="btn btn-primary btn-lg" type="submit">
          Submit Quiz
        </button>

        <!-- Reset button clears answers and feedback -->
        <button class="btn btn-outline-secondary"
                id="resetBtn"
                type="button">
          Reset Answers
        </button>

      </div>



      <!-- TOTAL SCORE DISPLAY -->

      <section class="card shadow-sm">

        <div class="card-body text-center">

          <!-- Score section title -->
          <h2 class="h4 mb-1">Your Total Score</h2>

          <!-- JavaScript will update this value -->
          <p class="display-6 mb-2">
            <span id="totalScore">0</span>/100
          </p>

          <!-- This congratulatory message only appears if score > 80 -->
          <div id="congrats"
               class="alert alert-success d-none"
               role="alert">

            🎉 Congrats! You scored above 80!

          </div>

        </div>

      </section>


    </form>



    <!-- Page footer -->
    <footer class="text-center text-muted mt-4">
      <small>
        HW2 - CST336 | US Geography Quiz
      </small>
    </footer>


  </div>



  <!-- JavaScript file that runs the quiz logic -->
  <!-- This handles scoring, feedback, storage, etc -->
  <script src="js/quiz.js"></script>


</body>
</html>
